---

name: Unit Tests

on:
  push:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '**/*.rst'
    branches:
      - master
      - '[0-9].*'
      - 'feature/**'
      - 'topic/**'
  pull_request:
    branches:
      - master
      - '[0-9].*'
      - 'feature/**'

jobs:
  unit-tests:
    name: Unit Tests (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['8', '25']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
          key: jedis-jdk${{ matrix.java }}-${{ hashFiles('**/pom.xml') }}

      - name: Maven offline
        run: |
          mvn -q dependency:go-offline

      - name: Build docs
        run: |
          mvn javadoc:jar

      - name: Run Unit Tests
        env:
          MAVEN_ARGS: ${{ matrix.java == '25' && '-DJVM_OPTS=-Dnet.bytebuddy.experimental=true' || '' }}
        run: |
          mvn -B -Dwith-param-names=true clean test jacoco:report -Djacoco.dataFile=target/jacoco-ut.exec

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && github.actor != 'dependabot[bot]'
        with:
          check_name: "Unit Test Results (JDK ${{ matrix.java }})"
          files: |
            target/surefire-reports/**/*.xml

      - name: Upload coverage to Codecov
        if: matrix.java == '8'
        uses: codecov/codecov-action@v5
        with:
          files: ./target/site/jacoco/jacoco.xml
          flags: unit-tests
          name: unit-test-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

